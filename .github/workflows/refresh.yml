name: Refresh UFC data
on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Scrape new events, fights, and stats
        run: python scrape_ufc_stats_unparsed_data.py
      - name: Commit updated CSVs
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add *.csv
          git commit -m "data refresh $(date -u +%Y-%m-%d)" || echo "no changes"
          git push
